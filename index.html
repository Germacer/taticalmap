<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Central Veicular OS</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-main: #FFFFFF;
            --accent-color: #00FFCC;
            --danger-color: #FF3333;
            --panel-bg: #0a0a0a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Top Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 15px 25px;
            font-size: 1.2rem;
            border-bottom: 1px solid #333;
            color: #888;
            background-color: var(--panel-bg);
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .gps-status {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background-color: var(--danger-color);
        }
        .gps-ok { background-color: #00FF00; }
        .gps-warn { background-color: #FFA500; }

        /* Dashboard Grid */
        .dashboard {
            display: flex;
            flex: 1;
            padding: 20px;
        }

        /* Velocímetro e Odômetro */
        .speed-center {
            flex: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 1px solid #222;
        }

        .speed-value {
            font-size: 25vw;
            font-weight: 700;
            line-height: 1;
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
        }

        .speed-unit {
            font-size: 2rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: -15px;
        }

        .trip-container {
            margin-top: 30px;
            text-align: center;
            background-color: #111;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        .trip-label {
            font-size: 0.9rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .trip-value {
            font-size: 1.8rem;
            font-weight: 300;
            color: #FFF;
        }

        /* Painel de Telemetria */
        .side-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 30px;
            gap: 25px;
        }

        .data-box {
            display: flex;
            flex-direction: column;
            background-color: var(--panel-bg);
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid #333;
            transition: border-color 0.3s;
        }

        .data-box.active-g {
            border-left-color: var(--danger-color);
        }

        .data-label {
            font-size: 0.8rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .data-value {
            font-size: 2rem;
            font-weight: 300;
        }

        .data-sub {
            font-size: 1.2rem;
        }

        /* Tela de Início */
        #start-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            font-size: 1.5rem;
            background-color: var(--accent-color);
            color: #000;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            z-index: 100;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <button id="start-btn">INICIAR TELEMETRIA</button>

    <div id="ui-container" class="hidden" style="width: 100%; height: 100%; display: flex; flex-direction: column;">
        <div class="status-bar">
            <div class="status-item">
                <div id="gps-indicator" class="gps-status"></div>
                <span id="accuracy-display">Aguardando Satélites...</span>
            </div>
            <div class="status-item" id="clock-display">00:00</div>
        </div>

        <div class="dashboard">
            <div class="speed-center">
                <div class="speed-value" id="speed-display">00</div>
                <div class="speed-unit">km/h</div>
                
                <div class="trip-container">
                    <div class="trip-label">Distância Percorrida</div>
                    <div class="trip-value" id="trip-display">0.00 km</div>
                </div>
            </div>

            <div class="side-panel">
                <div class="data-box" id="g-force-box">
                    <span class="data-label">Força G (Lateral/Frontal)</span>
                    <span class="data-value" id="gforce-display">0.00 G</span>
                </div>
                <div class="data-box">
                    <span class="data-label">Bússola / Rumo</span>
                    <span class="data-value" id="heading-display">--°</span>
                </div>
                <div class="data-box">
                    <span class="data-label">Altitude</span>
                    <span class="data-value" id="altitude-display">-- m</span>
                </div>
                <div class="data-box">
                    <span class="data-label">Coordenadas Atuais</span>
                    <span class="data-value data-sub" id="coords-display">-- / --</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const uiContainer = document.getElementById('ui-container');
        const speedDisplay = document.getElementById('speed-display');
        const tripDisplay = document.getElementById('trip-display');
        const gforceDisplay = document.getElementById('gforce-display');
        const gforceBox = document.getElementById('g-force-box');
        const headingDisplay = document.getElementById('heading-display');
        const altitudeDisplay = document.getElementById('altitude-display');
        const coordsDisplay = document.getElementById('coords-display');
        const accuracyDisplay = document.getElementById('accuracy-display');
        const clockDisplay = document.getElementById('clock-display');
        const gpsIndicator = document.getElementById('gps-indicator');

        let wakeLock = null;
        let lastLat = null;
        let lastLon = null;
        let totalDistanceKm = 0;

        // Atualização do Relógio
        function updateClock() {
            const now = new Date();
            clockDisplay.textContent = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Screen Wake Lock API
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {
                console.warn(`Wake Lock erro: ${err.message}`);
            }
        }

        // Conversão de Graus para Pontos Cardeais
        function getDirection(heading) {
            if (heading === null || isNaN(heading)) return '--';
            const directions = ['N', 'NE', 'L', 'SE', 'S', 'SO', 'O', 'NO'];
            const index = Math.round(((heading %= 360) < 0 ? heading + 360 : heading) / 45) % 8;
            return `${Math.round(heading)}° ${directions[index]}`;
        }

        // Fórmula de Haversine para calcular distância entre duas coordenadas esféricas
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // Raio da Terra em km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = 
                Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; // Retorna em km
        }

        // Rastreio de Sensores de Movimento (Força G)
        function startTelemetry() {
            if (window.DeviceMotionEvent) {
                window.addEventListener('devicemotion', (event) => {
                    // Usamos a aceleração incluindo a gravidade para captar o vetor resultante do movimento
                    let accX = event.acceleration.x || 0;
                    let accY = event.acceleration.y || 0;
                    
                    // Calcula o vetor da aceleração horizontal (X e Y do tablet)
                    let accelerationVector = Math.sqrt(accX * accX + accY * accY);
                    
                    // Divide pela constante da gravidade para obter a Força G
                    let gForce = accelerationVector / 9.80665;
                    
                    gforceDisplay.textContent = `${gForce.toFixed(2)} G`;

                    // Efeito visual se a Força G for muito alta (ex: curva brusca ou frenagem forte)
                    if (gForce > 0.4) {
                        gforceBox.classList.add('active-g');
                    } else {
                        gforceBox.classList.remove('active-g');
                    }
                });
            } else {
                gforceDisplay.textContent = "Sensor Indisponível";
            }
        }

        // Rastreio do GPS
        function startGPS() {
            if (!navigator.geolocation) {
                accuracyDisplay.textContent = "GPS não suportado";
                return;
            }

            navigator.geolocation.watchPosition(
                (position) => {
                    // Velocidade
                    let speedMetersPerSecond = position.coords.speed;
                    if (speedMetersPerSecond !== null) {
                        let speedKmH = speedMetersPerSecond * 3.6;
                        if (speedKmH < 2) speedKmH = 0; // Filtro de ruído
                        speedDisplay.textContent = Math.round(speedKmH).toString().padStart(2, '0');
                    } else {
                        speedDisplay.textContent = "00";
                    }

                    // Odômetro (Cálculo de Distância)
                    const currentLat = position.coords.latitude;
                    const currentLon = position.coords.longitude;
                    
                    if (lastLat !== null && lastLon !== null) {
                        // Só soma a distância se a precisão for boa (evita saltos falsos de GPS)
                        if (position.coords.accuracy <= 25) {
                            const distance = calculateDistance(lastLat, lastLon, currentLat, currentLon);
                            totalDistanceKm += distance;
                            tripDisplay.textContent = `${totalDistanceKm.toFixed(2)} km`;
                        }
                    }
                    
                    lastLat = currentLat;
                    lastLon = currentLon;

                    // Precisão
                    const accuracy = position.coords.accuracy;
                    accuracyDisplay.textContent = `Precisão: ±${Math.round(accuracy)}m`;
                    
                    if (accuracy <= 10) gpsIndicator.className = 'gps-status gps-ok';
                    else if (accuracy <= 30) gpsIndicator.className = 'gps-status gps-warn';
                    else gpsIndicator.className = 'gps-status';

                    // Altitude e Rumo
                    if (position.coords.altitude !== null) {
                        altitudeDisplay.textContent = `${Math.round(position.coords.altitude)} m`;
                    }
                    headingDisplay.textContent = getDirection(position.coords.heading);

                    // Coordenadas
                    coordsDisplay.textContent = `${currentLat.toFixed(5)}, ${currentLon.toFixed(5)}`;
                },
                (error) => {
                    console.warn(`Erro GPS: ${error.message}`);
                    accuracyDisplay.textContent = "Sinal Perdido";
                    gpsIndicator.className = 'gps-status';
                },
                { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
            );
        }

        // Inicialização
        startBtn.addEventListener('click', () => {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(e => console.log(e));
            }
            requestWakeLock();
            
            startBtn.classList.add('hidden');
            uiContainer.classList.remove('hidden');
            
            startGPS();
            startTelemetry();
        });
    </script>
</body>
</html>
